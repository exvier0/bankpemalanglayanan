<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Virtual - Bank Pemalang</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #075e54;
            --bg-color: #e5ddd5;
            --bot-bubble: #ffffff;
            --user-bubble: #dcf8c6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header ala WhatsApp */
        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .chat-header img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
        }

        .status-info h4 { margin: 0; font-size: 16px; }
        .status-info span { font-size: 12px; opacity: 0.8; }

        /* Area Chat */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 0;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 0;
        }

        /* Input Area */
        .input-area {
            background: #f0f0f0;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            outline: none;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.1); }

        /* Loading Animation */
        .typing { font-style: italic; font-size: 12px; color: #666; display: none; }
    </style>
</head>
<body>

    <div class="chat-header">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" alt="AI">
        <div class="status-info">
            <h4>CS Virtual Bank Pemalang</h4>
            <span>Online | AI Assistant</span>
        </div>
    </div>

    <div id="chat-container">
        <div class="message bot-msg">
            Halo! 👋 Saya asisten virtual Bank Pemalang. Ada yang bisa saya bantu terkait informasi kredit atau layanan kami?
        </div>
    </div>

    <div id="typing-indicator" class="px-4 py-2 typing">AI sedang mengetik...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typing-indicator');

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Tampilkan pesan user
            appendMessage(message, 'user-msg');
            userInput.value = '';
            
            // 2. Tampilkan loading
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 3. Tembak ke API Server.js
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message })
                });

                const data = await response.json();

                // 4. Tampilkan respon AI
                if (data.success) {
                    appendMessage(data.text, 'bot-msg');
                } else {
                    appendMessage("Maaf, sistem sedang sibuk. Silakan coba lagi.", 'bot-msg');
                }
            } catch (error) {
                appendMessage("Koneksi error. Pastikan server.js sudah jalan.", 'bot-msg');
            } finally {
                typingIndicator.style.display = 'none';
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>

</body>
</html>
