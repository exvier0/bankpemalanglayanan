<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Produk - Bank Pemalang</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.15);
            --border-glass: rgba(255, 255, 255, 0.3);
            --text-color: #ffffff;
            --active-color: #facc15; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.95), rgba(42, 82, 152, 0.95)), url('cover.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-color);
            padding: 20px 0;
        }

        .container-calc {
            width: 100%; max-width: 600px; padding: 15px; position: relative;
            margin-top: 40px; /* Spacer biar ga nabrak tombol back */
        }

        /* TOMBOL KEMBALI DI POJOK KIRI ATAS */
        .btn-back-fixed {
            position: fixed; top: 20px; left: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.2); color: white;
            text-decoration: none; border: 1px solid rgba(255,255,255,0.2);
            font-size: 1.2rem; z-index: 1000;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .btn-back-fixed:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); color: white; }

        /* Glass Card Design */
        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 25px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* TAB NAVIGATION */
        .nav-pills {
            background: rgba(0,0,0,0.25); padding: 5px; border-radius: 50px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-pills .nav-link {
            color: rgba(255,255,255,0.8); border-radius: 40px; font-weight: 500; transition: 0.3s;
        }
        .nav-pills .nav-link.active {
            background: var(--active-color); color: #1e3c72; font-weight: bold;
            box-shadow: 0 5px 20px rgba(250, 204, 21, 0.3);
        }
        .nav-pills .nav-link:hover:not(.active) { color: white; background: rgba(255,255,255,0.1); }

        /* INPUTS & SELECTS */
        .form-label { font-size: 0.9rem; margin-bottom: 5px; opacity: 0.9; }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; border-radius: 12px; padding: 12px; font-size: 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.25); color: white;
            box-shadow: none; border-color: rgba(255, 255, 255, 0.6);
        }
        option { background-color: #1e3c72; color: white; padding: 10px; }

        .btn-hitung {
            width: 100%; padding: 14px; border-radius: 15px; font-size: 1rem;
            font-weight: 700; border: none; margin-top: 20px; transition: 0.3s; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-kredit { background: linear-gradient(45deg, #4ade80, #22c55e); color: #064e3b; }
        .btn-kredit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74, 222, 128, 0.4); }

        .btn-tabungan { background: linear-gradient(45deg, #60a5fa, #3b82f6); color: #1e3a8a; }
        .btn-tabungan:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(96, 165, 250, 0.4); }

        .btn-deposito { background: linear-gradient(45deg, #f472b6, #ec4899); color: #831843; }
        .btn-deposito:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244, 114, 182, 0.4); }

        /* RESULT BOX */
        .result-box {
            margin-top: 25px; padding: 20px; background: rgba(0, 0, 0, 0.4);
            border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            display: none; animation: slideUp 0.5s ease;
        }
        .result-value { font-size: 2rem; font-weight: 800; margin: 5px 0 15px 0; color: #facc15; text-shadow: 0 2px 10px rgba(250, 204, 21, 0.3); }
        .detail-row { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; margin-top: 8px; font-size: 0.95rem; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <a href="/" class="btn-back-fixed"><i class="fas fa-arrow-left"></i></a>

    <div class="container-calc">
        <div class="glass-card">
            <h4 class="text-center fw-bold mb-4"><i class="fas fa-calculator me-2"></i>Simulasi Produk</h4>

            <ul class="nav nav-pills nav-fill" id="pills-tab" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#content-kredit"><i class="fas fa-money-bill-wave me-1"></i> Kredit</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-tabungan"><i class="fas fa-piggy-bank me-1"></i> Tabungan</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#content-deposito"><i class="fas fa-briefcase me-1"></i> Deposito</button></li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="content-kredit">
                    <form onsubmit="hitungKredit(event)">
                        <div class="mb-3">
                            <label class="form-label">Jenis Pinjaman</label>
                            <select class="form-select fw-bold text-warning" id="k_jenis" onchange="autoRateKredit()">
                                <option value="konsumtif" data-rate="12">Kredit Konsumtif</option>
                                <option value="investasi" data-rate="10">Kredit Investasi</option>
                                <option value="modal" data-rate="11">Kredit Modal Kerja</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Jumlah Pinjaman</label>
                            <input type="number" id="k_plafond" class="form-control" placeholder="Rp..." required>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Tenor (Bulan)</label>
                                <input type="number" id="k_tenor" class="form-control" placeholder="12" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Bunga (%)</label>
                                <input type="number" step="0.01" id="k_bunga" class="form-control" value="12" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-hitung btn-kredit">HITUNG ANGSURAN</button>
                    </form>
                    <div id="res-kredit" class="result-box">
                        <div class="result-value" id="val-k-angsuran">Rp 0</div>
                        <div class="detail-row"><span>Produk:</span><span id="txt-k-jenis" class="text-warning">-</span></div>
                        <div class="detail-row"><span>Pokok:</span><span id="val-k-pokok">Rp 0</span></div>
                        <div class="detail-row"><span>Bunga:</span><span id="val-k-bunga">Rp 0</span></div>
                    </div>
                </div>

                <div class="tab-pane fade" id="content-tabungan">
                    <form onsubmit="hitungTabungan(event)">
                        <div class="mb-3">
                            <label class="form-label">Jenis Simpanan</label>
                            <select class="form-select fw-bold text-info" id="t_jenis" onchange="autoRateTabungan()">
                                <option value="Tabumas" data-rate="2">Tabungan Umum</option>
                                <option value="Simpel" data-rate="1">Tabungan Pelajar</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Saldo</label>
                            <input type="number" id="t_saldo" class="form-control" placeholder="Rp..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bunga (%)</label>
                            <input type="number" step="0.01" id="t_bunga" class="form-control" value="2" required>
                        </div>
                        <button type="submit" class="btn-hitung btn-tabungan">HITUNG HASIL</button>
                    </form>
                    <div id="res-tabungan" class="result-box">
                        <div class="result-value" id="val-t-net">Rp 0</div>
                        <div class="detail-row"><span>Bunga Kotor:</span><span id="val-t-gross">Rp 0</span></div>
                    </div>
                </div>

                <div class="tab-pane fade" id="content-deposito">
                    <form onsubmit="hitungDeposito(event)">
                        <div class="mb-3">
                            <label class="form-label">Nominal</label>
                            <input type="number" id="d_nominal" class="form-control" placeholder="Rp..." required>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Tenor</label>
                                <select id="d_tenor" class="form-select">
                                    <option value="1">1 Bulan</option>
                                    <option value="3">3 Bulan</option>
                                    <option value="6">6 Bulan</option>
                                    <option value="12">12 Bulan</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Bunga (%)</label>
                                <input type="number" step="0.01" id="d_bunga" class="form-control" value="4.5" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-hitung btn-deposito">HITUNG DEPOSITO</button>
                    </form>
                    <div id="res-deposito" class="result-box">
                        <div class="result-value" id="val-d-net">Rp 0</div>
                        <div class="detail-row"><span>Bunga Kotor:</span><span id="val-d-gross">Rp 0</span></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        function autoRateKredit() { document.getElementById('k_bunga').value = document.getElementById('k_jenis').options[document.getElementById('k_jenis').selectedIndex].getAttribute('data-rate'); }
        function autoRateTabungan() { document.getElementById('t_bunga').value = document.getElementById('t_jenis').options[document.getElementById('t_jenis').selectedIndex].getAttribute('data-rate'); }

        function hitungKredit(e) {
            e.preventDefault();
            let P = parseFloat(document.getElementById('k_plafond').value), T = parseFloat(document.getElementById('k_tenor').value), R = parseFloat(document.getElementById('k_bunga').value);
            if(!P || !T || !R) return;
            let angsuran = (P / T) + ((P * (R/100))/12);
            document.getElementById('val-k-angsuran').innerText = formatRp(angsuran);
            document.getElementById('val-k-pokok').innerText = formatRp(P/T);
            document.getElementById('val-k-bunga').innerText = formatRp((P * (R/100))/12);
            document.getElementById('txt-k-jenis').innerText = document.getElementById('k_jenis').options[document.getElementById('k_jenis').selectedIndex].text;
            document.getElementById('res-kredit').style.display = 'block';
        }

        function hitungTabungan(e) {
            e.preventDefault();
            let S = parseFloat(document.getElementById('t_saldo').value), R = parseFloat(document.getElementById('t_bunga').value);
            if(!S || !R) return;
            let gross = (S * (R/100)) / 12;
            document.getElementById('val-t-net').innerText = formatRp(gross); // Simple calculation
            document.getElementById('val-t-gross').innerText = formatRp(gross);
            document.getElementById('res-tabungan').style.display = 'block';
        }

        function hitungDeposito(e) {
            e.preventDefault();
            let N = parseFloat(document.getElementById('d_nominal').value), T = parseFloat(document.getElementById('d_tenor').value), R = parseFloat(document.getElementById('d_bunga').value);
            if(!N || !T || !R) return;
            let gross = (N * (R/100) * T) / 12;
            document.getElementById('val-d-net').innerText = formatRp(gross);
            document.getElementById('val-d-gross').innerText = formatRp(gross);
            document.getElementById('res-deposito').style.display = 'block';
        }
    </script>
</body>
</html>
