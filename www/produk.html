<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - Bank Pemalang</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #1e3c72;
            --secondary-color: #2a5298;
            --accent-color: #ffd700;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar-custom {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .navbar-brand {
            font-weight: bold;
            color: white !important;
            letter-spacing: 1px;
        }

        /* RUNNING TEXT */
        .marquee-wrapper {
            background: #fff;
            border-bottom: 2px solid var(--accent-color);
            overflow: hidden;
            white-space: nowrap;
            height: 40px;
            display: flex;
            align-items: center;
        }
        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-left 20s linear infinite;
            font-weight: 600;
            color: var(--primary-color);
        }
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* HERO SECTION */
        .hero-section {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* PRODUCT CARDS */
        .card-produk {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
            background: white;
            height: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .card-produk:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .card-icon {
            background: rgba(30, 60, 114, 0.1);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            color: var(--primary-color);
            font-size: 2rem;
            transition: 0.3s;
        }
        .card-produk:hover .card-icon {
            background: var(--primary-color);
            color: white;
        }
        .card-body {
            text-align: center;
        }
        .card-title {
            font-weight: 800;
            color: #333;
            margin-bottom: 15px;
        }
        .card-text {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .badge-update {
            font-size: 0.7rem;
            background: #e9ecef;
            color: #6c757d;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 15px;
            display: inline-block;
        }

        /* FOOTER */
        .footer {
            margin-top: auto;
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-university me-2"></i> BANK PEMALANG
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="fas fa-arrow-left me-2"></i> Kembali ke Antrian
                </a>
            </div>
        </div>
    </nav>

    <div class="marquee-wrapper">
        <div class="marquee-content" id="running-text">
            Selamat Datang di Bank Pemalang - Mitra Terpercaya Keuangan Anda...
        </div>
    </div>

    <div class="hero-section">
        <div class="container">
            <h1 class="fw-bold text-primary mb-2">Layanan & Produk Unggulan</h1>
            <p class="text-muted">Temukan solusi keuangan terbaik yang kami tawarkan khusus untuk Anda.</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4" id="list-produk">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Memuat data produk...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2024 Bank Pemalang. Melayani Setulus Hati.
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadRunningText();
            loadProducts();
        });

        // 1. Ambil Running Text dari LocalStorage (Yang di-set di Admin)
        function loadRunningText() {
            const text = localStorage.getItem('info_running_text');
            if (text) {
                document.getElementById('running-text').innerText = text;
            }
        }

        // 2. Ambil Data Produk dari LocalStorage
        function loadProducts() {
            const container = document.getElementById('list-produk');
            const data = JSON.parse(localStorage.getItem('db_produk') || '[]');

            container.innerHTML = ''; // Hapus loading

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="150" class="mb-3 opacity-50">
                        <h4 class="text-muted">Belum ada info produk.</h4>
                        <p>Silakan hubungi Customer Service kami.</p>
                    </div>
                `;
                return;
            }

            data.forEach(item => {
                // Pilih ikon otomatis berdasarkan nama produk (Simulasi Kecerdasan)
                let icon = "fa-box-open"; // Default
                const nama = item.nama.toLowerCase();
                
                if(nama.includes("kredit") || nama.includes("pinjaman")) icon = "fa-hand-holding-usd";
                else if(nama.includes("tabungan") || nama.includes("simpanan")) icon = "fa-piggy-bank";
                else if(nama.includes("deposito")) icon = "fa-chart-line";
                else if(nama.includes("haji") || nama.includes("umroh")) icon = "fa-kaaba";
                else if(nama.includes("emas") || nama.includes("logam")) icon = "fa-gem";
                else if(nama.includes("kur") || nama.includes("usaha")) icon = "fa-store";

                // Template HTML Kartu
                const html = `
                <div class="col-md-4 col-sm-6">
                    <div class="card card-produk">
                        <div class="card-icon">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${item.nama}</h5>
                            <p class="card-text">${item.desc}</p>
                            <span class="badge-update">
                                <i class="fas fa-clock me-1"></i> Update: ${item.updated}
                            </span>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += html;
            });
        }

        // Auto Refresh jika Admin melakukan update (Tanpa reload halaman)
        window.addEventListener('storage', () => {
            console.log("Data berubah, memuat ulang...");
            loadRunningText();
            loadProducts();
        });
    </script>

</body>
</html>
