<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas - Bank Pemalang</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === STYLE GLASSMORPHISM (SAMA PERSIS SKM & HARIAN) === */
        :root {
            --bg-overlay: rgba(30, 60, 114, 0.85);
            --bg-overlay-2: rgba(42, 82, 152, 0.85);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --input-bg: #f1f3f5;
            --input-border: #e9ecef;
        }

        .dark-theme {
            --bg-overlay: rgba(15, 23, 42, 0.95);
            --bg-overlay-2: rgba(30, 41, 59, 0.95);
            --card-bg: rgba(30, 41, 59, 0.95);
            --text-color: #f8fafc;
            --input-bg: #1e293b;
            --input-border: #475569;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh; margin: 0;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, var(--bg-overlay), var(--bg-overlay-2)), url('cover.jpg');
            background-size: cover; background-position: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            color: var(--text-color);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            width: 100%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.8s ease;
        }

        .logo-area {
            width: 80px; height: 80px; background: white;
            border-radius: 50%; margin: -60px auto 20px auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .logo-area img { width: 50px; }

        .form-control {
            background: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: 50px; padding: 12px 20px; margin-bottom: 15px;
            color: var(--text-color);
        }
        .form-control:focus { box-shadow: none; border-color: #1e3c72; }

        .btn-login {
            width: 100%; padding: 12px; border-radius: 50px; border: none;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white; font-weight: bold; margin-top: 10px;
            transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3); }

        /* Tools Pojok Kanan */
        .top-tools { position: absolute; top: 20px; right: 20px; }
        .tool-btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 12px; border-radius: 50%; cursor: pointer;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-tools">
        <button class="tool-btn" onclick="toggleDarkMode()"><i class="fas fa-moon" id="icon-mode"></i></button>
    </div>

    <div class="login-card">
        <div class="logo-area">
            <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2534/2534197.png'">
        </div>
        <h3 class="fw-bold mb-1">Admin Login</h3>
        <p class="small text-muted mb-4">Silakan masuk untuk akses dashboard</p>

        <form id="loginForm">
            <div class="text-start">
                <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="text-start">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn-login">MASUK <i class="fas fa-sign-in-alt ms-2"></i></button>
        </form>

        <div class="mt-4 text-center">
            <a href="index.html" class="btn-kembali small text-decoration-none opacity-75"><i class="fas fa-arrow-left"></i> Kembali ke Menu Utama</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // === DARK MODE LOGIC ===
        function checkTheme() {
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('icon-mode').className = 'fas fa-sun';
            } else {
                document.body.classList.remove('dark-theme');
                document.getElementById('icon-mode').className = 'fas fa-moon';
            }
        }
        checkTheme();

        function toggleDarkMode() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('icon-mode').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // === LOGIC LOGIN: VERIFIKASI PASSWORD DARI SERVER ===
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.querySelector('.btn-login');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!user || !pass) {
                Swal.fire('Gagal', 'Username dan Password harus diisi', 'error');
                return;
            }

            // 1. Ubah tombol jadi Loading
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;

            // 2. POST ke server untuk verifikasi
            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: user, password: pass }).toString()
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    // Login berhasil, arahkan ke /admin
                    Swal.fire({
                        icon: 'success',
                        title: 'Berhasil Masuk!',
                        text: 'Mengalihkan ke Dashboard...',
                        timer: 1200,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '/admin';
                    });
                } else {
                    // Login gagal
                    Swal.fire('Gagal', data.msg || 'Username/Password salah', 'error');
                    btn.innerHTML = 'MASUK <i class="fas fa-sign-in-alt ms-2"></i>';
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                Swal.fire('Gagal', 'Tidak dapat terhubung ke server. Pastikan server sedang berjalan.', 'error');
                btn.innerHTML = 'MASUK <i class="fas fa-sign-in-alt ms-2"></i>';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
